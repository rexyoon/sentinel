# 로컬 개발용 인프라: PostgreSQL 16 + Redis 7
# 접속 정보는 .env 에서 주입된다 (.env.example 참고). 시크릿 하드코딩 금지 원칙.
services:
  postgres:
    image: postgres:16
    container_name: sentinel-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      # named volume: 컨테이너를 지워도 데이터는 남는다.
      # 비유하자면, 캠핑카(컨테이너)는 바꿔 타도 짐(볼륨)은 창고에 보관하는 것.
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      # 왜 pg_isready인가: 포트가 열렸다고 DB가 준비된 것이 아니다.
      # 초기화 스크립트가 도는 동안 접속하면 실패하므로, "쿼리 받을 준비 완료"를 직접 물어본다.
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7
    container_name: sentinel-redis
    # appendonly: 재시작해도 캐시가 날아가지 않도록 AOF 영속화 켬 (개발 편의)
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
  redisdata:
